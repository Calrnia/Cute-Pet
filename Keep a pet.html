<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Cutie Pet</title>
<style>
:root {
    --ui-gap: clamp(10px, 2.2vh, 18px);
    --panel-radius: 16px;
    --panel-border: rgba(255, 255, 255, 0.26);
    --panel-bg: linear-gradient(180deg, rgba(14, 17, 30, 0.82), rgba(6, 7, 16, 0.92));
    --text-color: rgba(245, 246, 255, 0.97);
}

* {
    box-sizing: border-box;
}

html,
body {
    margin: 0;
    width: 100%;
    min-height: 100%;
    background: #000;
    color: var(--text-color);
    font-family: "Noto Serif TC", "PMingLiU", serif;
}

body {
    overflow: hidden;
}

.vn-app {
    position: relative;
    min-height: 100dvh;
    isolation: isolate;
}

#bg {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    z-index: -4;
}

.bg-filter {
    position: absolute;
    inset: 0;
    z-index: -3;
    background:
        radial-gradient(ellipse at 50% 76%, rgba(255, 233, 205, 0.2), transparent 52%),
        radial-gradient(circle at 50% 8%, rgba(255, 255, 255, 0.15), transparent 42%),
        linear-gradient(to bottom, rgba(0, 0, 0, 0.15), rgba(0, 0, 0, 0.62));
}

.vignette {
    position: absolute;
    inset: 0;
    z-index: -2;
    pointer-events: none;
    background: radial-gradient(circle, transparent 40%, rgba(0, 0, 0, 0.48) 100%);
}

.layout {
    min-height: 100dvh;
    display: grid;
    grid-template-rows: minmax(180px, 1fr) auto;
    gap: var(--ui-gap);
    padding: clamp(12px, 2.3vw, 24px);
    padding-bottom: calc(clamp(12px, 2.3vw, 24px) + env(safe-area-inset-bottom));
}

.stage {
    position: relative;
    min-height: 0;
    border-radius: var(--panel-radius);
    border: 1px solid rgba(255, 255, 255, 0.15);
    background: linear-gradient(180deg, rgba(0, 0, 0, 0.1), rgba(0, 0, 0, 0.22));
    box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.05), 0 16px 32px rgba(0, 0, 0, 0.35);
    overflow: hidden;
    display: flex;
    align-items: flex-end;
    justify-content: center;
}

#rabbit {
    width: min(55vw, 460px);
    max-height: min(82%, 520px);
    object-fit: contain;
    transform-origin: center bottom;
    filter: drop-shadow(0 14px 22px rgba(0, 0, 0, 0.55));
    animation: rabbitIdle 2.7s ease-in-out infinite;
}

@keyframes rabbitIdle {
    0% { transform: translateY(0px); }
    50% { transform: translateY(-6px); }
    100% { transform: translateY(0px); }
}

.hud {
    position: absolute;
    top: 12px;
    left: 12px;
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    z-index: 2;
}

.hud-chip {
    padding: 6px 10px;
    font-size: 13px;
    letter-spacing: 0.06em;
    border-radius: 999px;
    border: 1px solid rgba(255, 255, 255, 0.25);
    background: rgba(10, 12, 24, 0.64);
    backdrop-filter: blur(2px);
}

.dialogue-panel {
    width: min(100%, 980px);
    justify-self: center;
    border-radius: var(--panel-radius);
    border: 1px solid var(--panel-border);
    background: var(--panel-bg);
    box-shadow: 0 16px 38px rgba(0, 0, 0, 0.42);
    padding: clamp(12px, 1.9vw, 18px);
    display: grid;
    grid-template-rows: auto minmax(100px, 24dvh) auto auto auto;
    gap: 10px;
}

.speaker {
    font-size: clamp(14px, 2vw, 18px);
    letter-spacing: 0.08em;
    color: #ffdcb6;
    width: fit-content;
    padding: 5px 10px;
    border-radius: 999px;
    border: 1px solid rgba(255, 222, 185, 0.4);
    background: rgba(58, 35, 18, 0.45);
}

#text {
    margin: 0;
    width: 100%;
    overflow: auto;
    white-space: pre-line;
    line-height: 1.82;
    font-size: clamp(16px, 2.1vw, 22px);
    padding: clamp(10px, 1.8vw, 16px);
    border-radius: 12px;
    border: 1px solid rgba(255, 255, 255, 0.14);
    background: rgba(7, 8, 16, 0.55);
    box-shadow: inset 0 0 18px rgba(0, 0, 0, 0.34);
    cursor: pointer;
}

#text::-webkit-scrollbar {
    width: 10px;
}

#text::-webkit-scrollbar-thumb {
    background: rgba(255, 255, 255, 0.3);
    border-radius: 999px;
}

.hint {
    font-size: 13px;
    color: rgba(230, 230, 240, 0.76);
    letter-spacing: 0.03em;
}

.btn-row {
    display: grid;
    gap: 10px;
}

.system-row {
    grid-template-columns: repeat(3, minmax(100px, 1fr));
}

#intro-ui {
    grid-template-columns: minmax(140px, 220px);
    justify-content: end;
}

#ui {
    grid-template-columns: repeat(3, minmax(120px, 1fr));
}

button {
    min-height: 44px;
    padding: 10px 14px;
    font-size: clamp(14px, 1.9vw, 17px);
    border-radius: 10px;
    border: 1px solid rgba(255, 255, 255, 0.28);
    color: #fff;
    background: linear-gradient(180deg, rgba(255, 255, 255, 0.24), rgba(255, 255, 255, 0.12));
    cursor: pointer;
    transition: transform 120ms ease, background 120ms ease;
}

button:hover:not(:disabled) {
    background: linear-gradient(180deg, rgba(255, 255, 255, 0.3), rgba(255, 255, 255, 0.16));
}

button:active:not(:disabled) {
    transform: translateY(1px);
}

button:disabled {
    opacity: 0.55;
    cursor: not-allowed;
}

.flash {
    animation: flash 130ms;
}

@keyframes flash {
    from { filter: brightness(1.33); }
    to { filter: brightness(1); }
}

@media (max-width: 760px) {
    .layout {
        grid-template-rows: minmax(130px, 1fr) auto;
    }

    #rabbit {
        width: min(70vw, 330px);
        max-height: min(80%, 350px);
    }

    .dialogue-panel {
        grid-template-rows: auto minmax(94px, 30dvh) auto auto auto;
    }

    #text {
        font-size: clamp(15px, 4.4vw, 18px);
        line-height: 1.72;
    }

    .system-row {
        grid-template-columns: repeat(3, minmax(0, 1fr));
    }

    #ui {
        grid-template-columns: repeat(2, minmax(120px, 1fr));
    }

    #ui button:nth-child(3) {
        grid-column: 1 / -1;
    }

    #intro-ui {
        justify-content: stretch;
        grid-template-columns: 1fr;
    }
}

@media (max-height: 760px) {
    .dialogue-panel {
        grid-template-rows: auto minmax(80px, 34dvh) auto auto auto;
    }

    #rabbit {
        width: min(45vw, 300px);
        max-height: min(76%, 250px);
    }
}
</style>
</head>
<body>
<div class="vn-app">
    <img id="bg" src="bg.png" alt="room">
    <div class="bg-filter"></div>
    <div class="vignette"></div>

    <main class="layout">
        <section class="stage">
            <div class="hud">
                <div class="hud-chip" id="round-chip">Round 1</div>
                <div class="hud-chip" id="day-chip">Day 1</div>
                <div class="hud-chip" id="mood-chip">情緒：平靜</div>
            </div>
            <img id="rabbit" src="r1.png" alt="rabbit">
        </section>

        <section class="dialogue-panel">
            <div id="speaker" class="speaker">旁白</div>
            <div id="text"></div>
            <div id="hint" class="hint">點擊對話框可快轉</div>

            <div id="system-ui" class="btn-row system-row">
                <button type="button" onclick="manualSave()">存檔</button>
                <button type="button" onclick="manualLoad()">讀檔</button>
                <button type="button" onclick="restartRound()">重開一輪</button>
            </div>

            <div id="intro-ui" class="btn-row">
                <button id="intro-btn" type="button" onclick="nextIntro()">繼續</button>
            </div>

            <div id="ui" class="btn-row" hidden>
                <button type="button" onclick="pet()">摸摸</button>
                <button type="button" onclick="ignore()">無視</button>
                <button type="button" onclick="stare()">盯著牠</button>
            </div>
        </section>
    </main>
</div>

<script>
const STORAGE_KEYS = {
    progress: "cutePetProgressV1",
    manual: "cutePetManualSaveV1"
};

const introScript = [
    { speaker: "旁白", text: "那天，你只是無聊。" },
    { speaker: "旁白", text: "手機滑到一半，看到一個奇怪的連結。" },
    { speaker: "旁白", text: "沒有標題，沒有說明。" },
    { speaker: "旁白", text: "只有一張圖片。" },
    { speaker: "旁白", text: "……一隻兔子。" },
    { speaker: "旁白", text: "你點了進去。" },
    { speaker: "旁白", text: "畫面打開。" },
    { speaker: "旁白", text: "沒有載入動畫。" },
    { speaker: "旁白", text: "沒有聲音。" },
    { speaker: "旁白", text: "只有一個房間。" },
    { speaker: "旁白", text: "還有那隻兔子。" },
    { speaker: "旁白", text: "牠坐在畫面中央。" },
    { speaker: "旁白", text: "一動也不動。" },
    { speaker: "旁白", text: "……你等了一下。" },
    { speaker: "旁白", text: "什麼都沒發生。" },
    { speaker: "旁白", text: "你準備關掉頁面。" },
    { speaker: "旁白", text: "就在這時——" },
    { speaker: "兔子", text: "「啾。」" },
    { speaker: "旁白", text: "你停住了。" },
    { speaker: "旁白", text: "你很確定。" },
    { speaker: "旁白", text: "你沒有開聲音。" },
    { speaker: "旁白", text: "……你盯著牠。" },
    { speaker: "旁白", text: "牠還是沒有動。" },
    { speaker: "旁白", text: "但你突然覺得——" },
    { speaker: "旁白", text: "牠剛剛，好像在看你。" }
];

const rabbit = document.getElementById("rabbit");
const text = document.getElementById("text");
const speaker = document.getElementById("speaker");
const hint = document.getElementById("hint");
const introUi = document.getElementById("intro-ui");
const introBtn = document.getElementById("intro-btn");
const ui = document.getElementById("ui");
const roundChip = document.getElementById("round-chip");
const dayChip = document.getElementById("day-chip");
const moodChip = document.getElementById("mood-chip");
const actionButtons = Array.from(ui.querySelectorAll("button"));

let round = parseInt(localStorage.getItem("round"), 10) || 1;
let day = parseInt(localStorage.getItem("day"), 10) || 1;
let affection = parseInt(localStorage.getItem("affection"), 10) || 0;
let ignored = parseInt(localStorage.getItem("ignored"), 10) || 0;
let stared = parseInt(localStorage.getItem("stared"), 10) || 0;
let introMode = localStorage.getItem("introMode") === "0" ? false : true;
let introIndex = parseInt(localStorage.getItem("introIndex"), 10);
let endingPlayed = localStorage.getItem("endingPlayed") === "1";
let hintTimerId = null;

if (!Number.isInteger(introIndex)) introIndex = 0;
if (introIndex < 0) introIndex = 0;
if (introIndex > introScript.length) introIndex = introScript.length;

const typer = {
    active: false,
    fullText: "",
    index: 0,
    timer: null,
    context: "none"
};

function pick(list) {
    return list[Math.floor(Math.random() * list.length)];
}

function clampInt(value, fallback, min, max) {
    const n = Number.parseInt(value, 10);
    if (!Number.isFinite(n)) return fallback;
    return Math.min(max, Math.max(min, n));
}

function setActionDisabled(disabled) {
    actionButtons.forEach((button) => {
        button.disabled = disabled;
    });
}

function setHintMessage(message, duration = 1800) {
    hint.innerText = message;
    if (hintTimerId) {
        clearTimeout(hintTimerId);
        hintTimerId = null;
    }

    if (duration > 0) {
        hintTimerId = setTimeout(() => {
            hintTimerId = null;
            updateHint();
        }, duration);
    }
}

function updateHint() {
    if (typer.active) {
        hint.innerText = "點擊對話框可快轉";
        return;
    }

    if (introMode) {
        hint.innerText = introIndex >= introScript.length ? "按「進入遊戲」開始" : "按「繼續」閱讀";
        return;
    }

    if (endingPlayed && day >= 5) {
        hint.innerText = "你可以讀檔，或直接重開一輪。";
        return;
    }

    hint.innerText = "請選擇你的行動";
}

function clearTyperTimer() {
    if (typer.timer) {
        clearTimeout(typer.timer);
        typer.timer = null;
    }
}

function finishTyping(showFullText = true) {
    if (!typer.active) return false;

    clearTyperTimer();

    if (showFullText) {
        text.innerText = typer.fullText;
        text.scrollTop = text.scrollHeight;
    }

    typer.active = false;

    if (typer.context === "game") {
        setActionDisabled(false);
    }

    typer.context = "none";
    updateHint();
    return true;
}

function charDelay(char) {
    if (char === "\n") return 190;
    if ("，。！？；：、".includes(char)) return 130;
    if (char === "…" || char === "—") return 180;
    return 34;
}

function typewrite(line, context) {
    finishTyping(false);

    typer.active = true;
    typer.fullText = line;
    typer.index = 0;
    typer.context = context;

    if (context === "game") {
        setActionDisabled(true);
    }

    text.innerText = "";
    updateHint();

    const tick = () => {
        if (!typer.active) return;

        typer.index += 1;
        text.innerText = typer.fullText.slice(0, typer.index);
        text.scrollTop = text.scrollHeight;

        if (typer.index >= typer.fullText.length) {
            finishTyping(false);
            return;
        }

        const currentChar = typer.fullText.charAt(typer.index - 1);
        typer.timer = setTimeout(tick, charDelay(currentChar));
    };

    tick();
}

function rabbitByState() {
    if (affection <= -3 || day >= 5) return "r5.png";
    if (affection >= 3) return "r2.png";
    if (affection <= -1) return "r3.png";
    return "r1.png";
}

function moodLabel() {
    if (affection >= 3) return "情緒：親近";
    if (affection >= 1) return "情緒：好奇";
    if (affection <= -3) return "情緒：扭曲";
    if (affection <= -1) return "情緒：不安";
    return "情緒：平靜";
}

function buildSnapshot() {
    return {
        version: 1,
        round,
        day,
        affection,
        ignored,
        stared,
        introMode,
        introIndex,
        endingPlayed,
        speaker: speaker.innerText,
        text: text.innerText,
        rabbit: rabbit.getAttribute("src") || rabbitByState(),
        introButtonText: introBtn.innerText,
        savedAt: Date.now()
    };
}

function saveState() {
    localStorage.setItem("round", String(round));
    localStorage.setItem("day", String(day));
    localStorage.setItem("affection", String(affection));
    localStorage.setItem("ignored", String(ignored));
    localStorage.setItem("stared", String(stared));
    localStorage.setItem("introMode", introMode ? "1" : "0");
    localStorage.setItem("introIndex", String(introIndex));
    localStorage.setItem("endingPlayed", endingPlayed ? "1" : "0");
    localStorage.setItem(STORAGE_KEYS.progress, JSON.stringify(buildSnapshot()));
}

function updateHud() {
    roundChip.innerText = "Round " + round;
    dayChip.innerText = "Day " + day;
    moodChip.innerText = moodLabel();
}

function gameLinePool() {
    if (affection >= 2) {
        speaker.innerText = "兔子";
        return [
            "牠靠近了一點，耳尖輕輕晃了一下。",
            "你指尖碰到牠時，牠沒有躲開。",
            "牠把目光停在你手上，像是在等下一次觸碰。"
        ];
    }

    if (affection <= -1) {
        speaker.innerText = "旁白";
        return [
            "牠往後縮了半步，眼神有些不穩。",
            "空氣像卡住一樣，牠只是盯著你。",
            "牠的耳朵抖了一下，卻沒有發出聲音。"
        ];
    }

    speaker.innerText = "旁白";
    return [
        "房間很安靜，只有牠的呼吸聲。",
        "牠坐在原地，像在等你先開口。",
        "你聽見時鐘的秒針，和牠幾乎同步。"
    ];
}

function renderGameDialogue() {
    rabbit.src = rabbitByState();
    updateHud();

    if (day >= 5 && !endingPlayed) {
        endingPlayed = true;
        speaker.innerText = "???";
        typewrite("第 " + day + " 天\n牠終於眨眼了。\n\n但不是你熟悉的那種眨眼。", "game");
        setTimeout(() => {
            document.body.classList.add("flash");
            rabbit.src = "r6.png";
            setTimeout(() => {
                document.body.classList.remove("flash");
            }, 130);
        }, 260);
        saveState();
        return;
    }

    const base = pick(gameLinePool());
    let message = "第 " + day + " 天\n" + base;

    if (ignored >= 2) message += "\n\n牠似乎記住了你轉身離開的次數。";
    if (stared >= 2) message += "\n\n牠回望你的時間，越來越久。";

    typewrite(message, "game");
    saveState();
}

function showNextIntroLine() {
    if (introIndex >= introScript.length) {
        startGame();
        return;
    }

    const line = introScript[introIndex];
    introIndex += 1;

    speaker.innerText = line.speaker;
    typewrite(line.text, "intro");
    introBtn.innerText = introIndex >= introScript.length ? "進入遊戲" : "繼續";

    saveState();
}

function nextIntro() {
    if (!introMode) return;
    if (finishTyping(true)) {
        saveState();
        return;
    }
    showNextIntroLine();
}

function startGame() {
    introMode = false;
    introUi.hidden = true;
    ui.hidden = false;
    renderGameDialogue();
    saveState();
}

function nextDay() {
    day += 1;
    renderGameDialogue();
}

function pet() {
    if (typer.active) return;
    affection += 1;
    nextDay();
}

function ignore() {
    if (typer.active) return;
    affection -= 1;
    ignored += 1;
    nextDay();
}

function stare() {
    if (typer.active) return;
    stared += 1;
    if (affection <= -1) {
        rabbit.src = "r4.png";
    }
    nextDay();
}

function applySnapshot(snapshot, persist = true) {
    if (!snapshot || typeof snapshot !== "object") return false;

    round = clampInt(snapshot.round, round, 1, 9999);
    day = clampInt(snapshot.day, day, 1, 9999);
    affection = clampInt(snapshot.affection, affection, -9999, 9999);
    ignored = clampInt(snapshot.ignored, ignored, 0, 9999);
    stared = clampInt(snapshot.stared, stared, 0, 9999);
    introMode = Boolean(snapshot.introMode);
    introIndex = clampInt(snapshot.introIndex, introIndex, 0, introScript.length);
    endingPlayed = Boolean(snapshot.endingPlayed);

    clearTyperTimer();
    typer.active = false;
    typer.context = "none";
    setActionDisabled(false);

    if (introMode) {
        introUi.hidden = false;
        ui.hidden = true;
        introBtn.innerText = introIndex >= introScript.length ? "進入遊戲" : "繼續";
    } else {
        introUi.hidden = true;
        ui.hidden = false;
    }

    speaker.innerText = typeof snapshot.speaker === "string" && snapshot.speaker ? snapshot.speaker : "旁白";
    rabbit.src = typeof snapshot.rabbit === "string" && snapshot.rabbit ? snapshot.rabbit : rabbitByState();

    if (typeof snapshot.text === "string" && snapshot.text.length > 0) {
        text.innerText = snapshot.text;
    } else if (introMode) {
        const previewIndex = Math.max(0, Math.min(introIndex - 1, introScript.length - 1));
        if (introScript[previewIndex]) {
            speaker.innerText = introScript[previewIndex].speaker;
            text.innerText = introScript[previewIndex].text;
        } else {
            text.innerText = "";
        }
    } else {
        text.innerText = "第 " + day + " 天\n已讀取進度，請選擇行動。";
    }

    text.scrollTop = text.scrollHeight;
    updateHud();
    updateHint();

    if (persist) saveState();
    return true;
}

function manualSave() {
    if (typer.active) finishTyping(true);

    const snapshot = buildSnapshot();
    localStorage.setItem(STORAGE_KEYS.manual, JSON.stringify(snapshot));
    saveState();
    setHintMessage("已存檔");
}

function manualLoad() {
    if (typer.active) finishTyping(true);

    const raw = localStorage.getItem(STORAGE_KEYS.manual);
    if (!raw) {
        setHintMessage("目前沒有存檔");
        return;
    }

    try {
        const snapshot = JSON.parse(raw);
        const ok = applySnapshot(snapshot, true);
        setHintMessage(ok ? "讀檔完成" : "讀檔失敗");
    } catch (error) {
        setHintMessage("存檔損毀，讀檔失敗");
    }
}

function restartRound() {
    if (typer.active) finishTyping(true);

    const confirmed = window.confirm("要開始下一輪嗎？目前回合進度會重置。");
    if (!confirmed) return;

    round += 1;
    day = 1;
    affection = 0;
    ignored = 0;
    stared = 0;
    introMode = true;
    introIndex = 0;
    endingPlayed = false;

    introUi.hidden = false;
    ui.hidden = true;
    introBtn.innerText = "繼續";

    speaker.innerText = "旁白";
    rabbit.src = "r1.png";

    updateHud();
    updateHint();
    showNextIntroLine();
    saveState();
    setHintMessage("第 " + round + " 輪開始");
}

function restoreFromAutoProgress() {
    const raw = localStorage.getItem(STORAGE_KEYS.progress);
    if (!raw) return false;

    try {
        const snapshot = JSON.parse(raw);
        return applySnapshot(snapshot, false);
    } catch (error) {
        return false;
    }
}

text.addEventListener("click", () => {
    if (typer.active) {
        finishTyping(true);
    } else if (introMode) {
        nextIntro();
    }
});

window.addEventListener("keydown", (event) => {
    if (event.key !== "Enter" && event.key !== " ") return;

    event.preventDefault();

    if (typer.active) {
        finishTyping(true);
        return;
    }

    if (introMode) {
        nextIntro();
    }
});

updateHud();
updateHint();

if (!restoreFromAutoProgress()) {
    introMode = true;
    introIndex = 0;
    introUi.hidden = false;
    ui.hidden = true;
    introBtn.innerText = "繼續";
    showNextIntroLine();
    saveState();
}
</script>
</body>
</html>
